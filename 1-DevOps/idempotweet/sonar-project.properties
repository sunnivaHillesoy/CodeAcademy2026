sonar.projectKey=CodeAcademy2026
sonar.projectName=Idempotweet

# Source directories
sonar.sources=src

# Test directories
sonar.tests=__tests__

# Coverage reports
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Exclusions
sonar.exclusions=**/node_modules/**,**/.next/**,**/coverage/**,**/.yarn/**,**/dist/**,**/*.test.ts,**/*.test.tsx

# Test exclusions
sonar.test.exclusions=**/__tests__/**,**/*.test.ts,**/*.test.tsx
